name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: 'America/Vancouver'

jobs:
  build-test:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      # CimianStudio has ProjectReferences to ../../../../packages/CimianTools/shared/
      # (the sibling-submodule layout we use locally under a parent Cimian folder).
      # CI checks out cimianstudio in isolation, so clone the public cimian repo
      # directly into the slot the ProjectReferences expect. Both Cimian.Import and
      # the YamlUtils consolidation now live on main (cimian PRs #26 and #28).
      - name: Checkout CimianTools sibling (for shared library ProjectReferences)
        shell: pwsh
        run: |
          # GITHUB_WORKSPACE is D:\a\<repo>\<repo>\ (double-nested), and the
          # ProjectReference goes four levels up from src/CimianStudio/ which
          # lands at D:\a\. So we go up two from GITHUB_WORKSPACE to D:\a\,
          # then create packages/CimianTools/ there.
          $siblingRoot = (Resolve-Path "$env:GITHUB_WORKSPACE\..\..").Path
          $target = Join-Path $siblingRoot 'packages\CimianTools'
          New-Item -ItemType Directory -Path (Split-Path $target) -Force | Out-Null
          git clone --depth=1 https://github.com/windowsadmins/cimian.git $target
          foreach ($required in @(
            "$target\shared\import\Cimian.Import.csproj",
            "$target\shared\core\Services\YamlUtils.cs")) {
            if (-not (Test-Path $required)) {
              throw "Required upstream file not found: $required"
            }
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~\.nuget\packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore CimianStudio.sln

      - name: Build
        run: dotnet build CimianStudio.sln --configuration Release --no-restore --verbosity minimal

      - name: Test
        run: dotnet test CimianStudio.sln --configuration Release --no-restore --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/*.trx
          if-no-files-found: ignore
